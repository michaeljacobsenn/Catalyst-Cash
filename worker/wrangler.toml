name = "catalystcash-api"
main = "src/index.js"
compatibility_date = "2024-12-01"

[vars]
ALLOWED_ORIGIN = "https://catalystcash.app,https://www.catalystcash.app,https://catalystcash.pages.dev"
# Launch default: enforce live gating in production unless an environment overrides it.
GATING_MODE = "live"
AUDIT_LOG_RETENTION_DAYS = "30"

# Primary web traffic should use api.catalystcash.app; native and loopback builds keep
# using the workers.dev hostname directly to avoid local-network and certificate drift.

[[d1_databases]]
binding = "DB"
database_name = "catalyst-cash-db"
database_id = "624abdaa-25bd-432a-a12b-39e2dbd7530e"
migrations_dir = "migrations"

[durable_objects]
bindings = [
  { name = "RATE_LIMITER", class_name = "RateLimiter" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RateLimiter"]

[triggers]
crons = ["0 4 * * *"]
